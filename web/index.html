<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="A simple task scheduler application built with JavaScript, HTML, and CSS. It allows users to create, update, and delete tasks, as well as set reminders for upcoming tasks.">
    <title>Scheduler App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <nav>
<!--            <button id="checkRemindersBtn">Reminder</button>-->
            <a href="#" id="notificationLink">Notifications</a>
        </nav>
    </header>
    <main>
        <div class="tasksContainer">
            <h1>TO DO</h1>
            <div id="tasksArea"></div>

            <div class="taskForm">
                <h2>ADD /  UPDATE TASK</h2><br>
                <form id="taskForm">
                    <div class="field">
                        <label for="taskTitle">Title *:</label><br>
                        <input type="text" name="title" id="taskTitle" placeholder="Enter Task Title" required="required"><br>
                    </div>
                    <div class="field">
                        <label for="taskNote">Description:</label><br>
                        <input type="text" name="description" id="taskNote" placeholder="Enter Task Description"><br>
                    </div>
                    <div class="field">
                        <label for="taskStart">Begins at *:</label><br>
                        <input type="datetime-local" name="startDate" id="taskStart" required="required"><br>
                    </div>
                    <div class="field">
                        <label for="taskEnd">Due Date *:</label><br>
                        <input type="datetime-local" name="endDate" id="taskEnd" required="required"><br>
                    </div>
                    <div class="field">
                        <label for="taskReminder">Remind before:</label><br>
                        <input type="number" name="reminder" id="taskReminder" value="15" min="1" placeholder="Enter Reminder Reminder"><br>
                    </div>
                    <div class="formBTN">
                        <button type="submit" name="actionType" value="save">Save Task</button>
                        <button type="submit" name="actionType" value="update" formnovalidate>Update Task</button>
                    </div>

                </form>
            </div>

        </div>

        <div class="selectedContainer">
            <h1>DETAILS</h1>
            <div id="selectedArea">
                <div ><span class="title">Title:</span><span id ="titleArea"></span></div>
                <div ><span class ="description">Description:</span><span id ="descriptionArea"></span></div>
                <div><span class ="begins">Begins:</span><span id="beginsArea"></span></div>
                <div><span class ="due">Due:</span><span id="dueArea"></span></div>
            </div>
            <div class="detailsButton">
                <button id="deleteTaskBTN">Delete Task</button>
                <button id="backBTN">Back</button>
            </div>
        </div>

        <div class="notificationContainer">
            <h2>NOTIFICATION</h2>
            <div id="notificationArea"></div>
            <button id="notifBackBTN">Back</button>
        </div>

        <div class="messageContainer">
            <h2>MESSAGE</h2>
            <div id="messageArea"></div>
        </div>

    </main>

    <script type="module" src="js/app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<!--    <script>eruda.init();</script>-->
</body>
</html>
